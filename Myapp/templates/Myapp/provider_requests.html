{% extends "base.html" %}
{% block content %}
<div
  id="provider-panel-live-root"
  data-partial-url="{{ provider_panel_partial_url }}"
  data-snapshot-url="{% url 'provider_panel_snapshot' %}"
>
  {% include "Myapp/partials/provider_panel_content.html" %}
</div>

<script>
  (function () {
    const liveRoot = document.getElementById("provider-panel-live-root");
    if (!liveRoot) return;

    const partialUrl = liveRoot.dataset.partialUrl || "";
    const snapshotUrl = liveRoot.dataset.snapshotUrl || "";
    const fallbackPollMs = 5000;
    const fallbackAfterMs = 15000;
    let lastSnapshotAt = Date.now();
    let refreshInFlight = false;
    let pendingRefresh = false;
    let stateToken = [
      "{{ provider_live_snapshot.signature|escapejs }}",
      Number("{{ provider_live_snapshot.pending_offers_count|default:0 }}"),
      Number("{{ provider_live_snapshot.latest_pending_offer_id|default:0 }}"),
      Number("{{ provider_live_snapshot.waiting_customer_selection_count|default:0 }}"),
      Number("{{ provider_live_snapshot.pending_appointments_count|default:0 }}"),
      Number("{{ provider_live_snapshot.unread_messages_count|default:0 }}")
    ].join("|");

    function buildToken(payload) {
      if (!payload || typeof payload !== "object") return "";
      return [
        String(payload.signature || ""),
        Number(payload.pending_offers_count || 0),
        Number(payload.latest_pending_offer_id || 0),
        Number(payload.waiting_customer_selection_count || 0),
        Number(payload.pending_appointments_count || 0),
        Number(payload.unread_messages_count || 0)
      ].join("|");
    }

    function hasActiveEditor() {
      const active = document.activeElement;
      if (!active || !liveRoot.contains(active)) return false;
      return ["INPUT", "TEXTAREA", "SELECT"].indexOf(active.tagName) >= 0;
    }

    async function refreshPanel() {
      if (!partialUrl || refreshInFlight) {
        pendingRefresh = true;
        return;
      }
      if (hasActiveEditor()) {
        pendingRefresh = true;
        return;
      }

      refreshInFlight = true;
      try {
        const response = await fetch(partialUrl, {
          method: "GET",
          credentials: "same-origin",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          cache: "no-store",
        });
        if (response.status === 401 || response.status === 403) {
          window.location.reload();
          return;
        }
        if (!response.ok) return;
        const payload = await response.json();
        if (!payload || typeof payload.html !== "string") return;
        liveRoot.innerHTML = payload.html;
        if (payload.snapshot) {
          stateToken = buildToken(payload.snapshot);
        }
        lastSnapshotAt = Date.now();
      } catch (error) {
        void error;
      } finally {
        refreshInFlight = false;
        if (pendingRefresh && !hasActiveEditor()) {
          pendingRefresh = false;
          refreshPanel();
        }
      }
    }

    function requestPanelRefresh() {
      if (refreshInFlight || hasActiveEditor()) {
        pendingRefresh = true;
        return;
      }
      refreshPanel();
    }

    function applySnapshot(payload) {
      const nextToken = buildToken(payload);
      if (!nextToken) return;
      if (stateToken && nextToken !== stateToken) {
        requestPanelRefresh();
        return;
      }
      stateToken = nextToken;
    }

    window.addEventListener("ustabul:nav-snapshot", function (event) {
      const detail = event && event.detail ? event.detail : {};
      if (detail.role !== "provider" || !detail.payload) return;
      lastSnapshotAt = Date.now();
      applySnapshot(detail.payload);
    });

    async function pollFallback() {
      if (document.hidden || refreshInFlight) return;
      if (Date.now() - lastSnapshotAt < fallbackAfterMs) return;
      try {
        const response = await fetch(snapshotUrl, {
          method: "GET",
          credentials: "same-origin",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          cache: "no-store",
        });
        if (!response.ok) return;
        const payload = await response.json();
        lastSnapshotAt = Date.now();
        applySnapshot(payload);
      } catch (error) {
        void error;
      }
    }

    document.addEventListener("focusout", function () {
      window.setTimeout(function () {
        if (pendingRefresh && !hasActiveEditor()) {
          pendingRefresh = false;
          refreshPanel();
        }
      }, 0);
    });

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden && pendingRefresh && !hasActiveEditor()) {
        pendingRefresh = false;
        refreshPanel();
      }
    });

    window.setInterval(pollFallback, fallbackPollMs);
  })();
</script>
{% endblock %}
