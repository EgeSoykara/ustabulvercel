{% extends "base.html" %}
{% block content %}
<div
  id="customer-panel-live-root"
  data-partial-url="{{ customer_panel_partial_url }}"
  data-snapshot-url="{% url 'customer_requests_snapshot' %}"
>
  {% include "Myapp/partials/customer_panel_content.html" %}
</div>

<script>
  (function () {
    const liveRoot = document.getElementById("customer-panel-live-root");
    if (!liveRoot) return;

    const partialUrl = liveRoot.dataset.partialUrl || "";
    const snapshotUrl = liveRoot.dataset.snapshotUrl || "";
    const fallbackPollMs = 5000;
    const fallbackAfterMs = 15000;
    let lastSnapshotAt = Date.now();
    let refreshInFlight = false;
    let pendingRefresh = false;
    let stateToken = [
      "{{ customer_snapshot.signature|escapejs }}",
      Number("{{ customer_snapshot.pending_customer_requests_count|default:0 }}"),
      Number("{{ customer_snapshot.matched_requests_count|default:0 }}"),
      Number("{{ customer_snapshot.pending_customer_appointments_count|default:0 }}"),
      Number("{{ customer_snapshot.confirmed_appointments_count|default:0 }}"),
      Number("{{ customer_snapshot.accepted_offers_count|default:0 }}"),
      Number("{{ customer_snapshot.unread_messages_count|default:0 }}")
    ].join("|");

    function buildToken(payload) {
      if (!payload || typeof payload !== "object") return "";
      return [
        String(payload.signature || ""),
        Number(payload.pending_customer_requests_count || 0),
        Number(payload.matched_requests_count || 0),
        Number(payload.pending_customer_appointments_count || 0),
        Number(payload.confirmed_appointments_count || 0),
        Number(payload.accepted_offers_count || 0),
        Number(payload.unread_messages_count || 0)
      ].join("|");
    }

    function hasActiveEditor() {
      const active = document.activeElement;
      if (!active || !liveRoot.contains(active)) return false;
      return ["INPUT", "TEXTAREA", "SELECT"].indexOf(active.tagName) >= 0;
    }

    function lockOfferSelection(root) {
      const offerForms = root.querySelectorAll("form[data-offer-select-form]");
      if (!offerForms.length) return;
      let selectionLocked = false;

      function lockSelection(selectedForm) {
        offerForms.forEach(function (form) {
          const submitButton = form.querySelector("[data-offer-select-submit]");
          if (!submitButton) return;
          submitButton.disabled = true;
          if (form === selectedForm) {
            submitButton.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Seçiliyor...';
          } else {
            submitButton.textContent = "Seçim kilitlendi";
          }
        });
      }

      offerForms.forEach(function (form) {
        form.addEventListener("submit", function (event) {
          if (selectionLocked) {
            event.preventDefault();
            return;
          }
          selectionLocked = true;
          lockSelection(form);
        });
      });
    }

    function toDateTimeLocalValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return year + "-" + month + "-" + day + "T" + hours + ":" + minutes;
    }

    function bindAppointmentQuickButtons(root) {
      const appointmentQuickButtons = root.querySelectorAll("button[data-appointment-offset-minutes]");
      appointmentQuickButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          const form = button.closest("form");
          if (!form) return;
          const input = form.querySelector("input[name='scheduled_for']");
          if (!input) return;
          const offset = Number(button.getAttribute("data-appointment-offset-minutes") || 0);
          const targetDate = new Date(Date.now() + Math.max(0, offset) * 60 * 1000);
          input.value = toDateTimeLocalValue(targetDate);
          input.dispatchEvent(new Event("input", { bubbles: true }));
          input.dispatchEvent(new Event("change", { bubbles: true }));
        });
      });
    }

    function initCustomerPanel(root) {
      lockOfferSelection(root);
      bindAppointmentQuickButtons(root);
    }

    async function refreshPanel() {
      if (!partialUrl || refreshInFlight) {
        pendingRefresh = true;
        return;
      }
      if (hasActiveEditor()) {
        pendingRefresh = true;
        return;
      }

      refreshInFlight = true;
      try {
        const response = await fetch(partialUrl, {
          method: "GET",
          credentials: "same-origin",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          cache: "no-store",
        });
        if (response.status === 401 || response.status === 403) {
          window.location.reload();
          return;
        }
        if (!response.ok) return;
        const payload = await response.json();
        if (!payload || typeof payload.html !== "string") return;
        liveRoot.innerHTML = payload.html;
        initCustomerPanel(liveRoot);
        if (payload.snapshot) {
          stateToken = buildToken(payload.snapshot);
        }
        lastSnapshotAt = Date.now();
      } catch (error) {
        void error;
      } finally {
        refreshInFlight = false;
        if (pendingRefresh && !hasActiveEditor()) {
          pendingRefresh = false;
          refreshPanel();
        }
      }
    }

    function requestPanelRefresh() {
      if (refreshInFlight || hasActiveEditor()) {
        pendingRefresh = true;
        return;
      }
      refreshPanel();
    }

    function applySnapshot(payload) {
      const nextToken = buildToken(payload);
      if (!nextToken) return;
      if (stateToken && nextToken !== stateToken) {
        requestPanelRefresh();
        return;
      }
      stateToken = nextToken;
    }

    window.addEventListener("ustabul:nav-snapshot", function (event) {
      const detail = event && event.detail ? event.detail : {};
      if (detail.role !== "customer" || !detail.payload) return;
      lastSnapshotAt = Date.now();
      applySnapshot(detail.payload);
    });

    async function pollFallback() {
      if (document.hidden || refreshInFlight) return;
      if (Date.now() - lastSnapshotAt < fallbackAfterMs) return;
      try {
        const response = await fetch(snapshotUrl, {
          method: "GET",
          credentials: "same-origin",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          cache: "no-store",
        });
        if (!response.ok) return;
        const payload = await response.json();
        lastSnapshotAt = Date.now();
        applySnapshot(payload);
      } catch (error) {
        void error;
      }
    }

    document.addEventListener("focusout", function () {
      window.setTimeout(function () {
        if (pendingRefresh && !hasActiveEditor()) {
          pendingRefresh = false;
          refreshPanel();
        }
      }, 0);
    });

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden && pendingRefresh && !hasActiveEditor()) {
        pendingRefresh = false;
        refreshPanel();
      }
    });

    initCustomerPanel(liveRoot);
    window.setInterval(pollFallback, fallbackPollMs);
  })();
</script>
{% endblock %}
